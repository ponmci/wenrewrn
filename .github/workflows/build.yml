name: Build RobloxExecutor

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-14

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Theos
        run: |
          export THEOS=~/theos

          # Clone Theos
          git clone --recursive https://github.com/theos/theos.git $THEOS 2>&1

          # Get iOS SDK (iPhoneOS16.5.sdk)
          mkdir -p $THEOS/sdks
          curl -sLO https://github.com/theos/sdks/archive/master.zip
          unzip -qo master.zip
          cp -rn sdks-master/*.sdk $THEOS/sdks/ 2>/dev/null || true
          rm -rf sdks-master master.zip

          # Verify
          echo "Theos installed: $(ls $THEOS/bin/nic.pl 2>/dev/null && echo OK || echo MISSING)"
          echo "SDKs:"
          ls $THEOS/sdks/ 2>/dev/null || echo "No SDKs found"

          # Install ldid (fake codesign for iOS tweaks)
          brew install ldid 2>&1

          # Set env for next steps
          echo "THEOS=$THEOS" >> $GITHUB_ENV
          echo "PATH=$THEOS/bin:$PATH" >> $GITHUB_ENV

      - name: Build
        env:
          THEOS: ~/theos
        run: |
          export THEOS=~/theos
          export PATH=$THEOS/bin:$PATH

          cd RobloxExecutor

          # Check if nic.pl exists
          which nic.pl || echo "nic.pl not in PATH"
          ls ~/theos/bin/ || echo "theos/bin missing"

          # Build
          make clean 2>&1 || true
          make FINALPACKAGE=1 2>&1

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: RobloxExecutor-build
          path: |
            RobloxExecutor/packages/*.deb
            RobloxExecutor/.theos/obj/**/*.dylib
          retention-days: 30
